name: MAST - Monitoramento Automatizado de Sistemas e Tribunais

"on":
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4
          pip install feedparser reportlab

      - name: Executar o Monitoramento
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_SLACK_DESTINATARIO}}
          PYTHONPATH: .
        run: |
          python main.py
      
      - name: Commit e Push do Banco de Dados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add mast_dados.db
          git commit -m "🗄️ Auto-update do banco de dados (MAST)" || echo "Nenhuma mudança no banco de dados."
          git push
          

          