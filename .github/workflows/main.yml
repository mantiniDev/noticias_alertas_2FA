name: MAST v1 — Monitoramento Automatizado de Sistemas e Tribunais

on:
  schedule:
    - cron: '00 08 * * *'
  workflow_dispatch:

jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4.2.2

      - name: Configurar o Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      # ── Camada 1: Cache do banco SQLite (rápido, mesmo dia) ──────────────
      - name: Restaurar banco de dados (cache)
        uses: actions/cache@v4
        with:
          path: v1/mast_dados.db
          key: mast-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mast-db-${{ runner.os }}-
            mast-db-

      # ── Camada 2: Artifact (fallback — até 90 dias) ──────────────────────
      - name: Restaurar banco de artifact (fallback se cache expirou)
        if: always()
        run: |
          if [ -f v1/mast_dados.db ]; then
            echo "✅ Banco disponível via cache — artifact não necessário."
          else
            echo "⚠️  Cache não encontrou banco — tentando recuperar do artifact mais recente..."
            RECOVERED=false
            for RUN_ID in $(gh run list \
                --workflow=main.yml \
                --status=success \
                --limit=10 \
                --json databaseId \
                --jq '.[].databaseId'); do
              if gh run download "$RUN_ID" --name mast-db-backup --dir v1/ 2>/dev/null; then
                echo "✅ Banco recuperado do artifact da execução $RUN_ID."
                RECOVERED=true
                break
              fi
            done
            if [ "$RECOVERED" = false ]; then
              echo "ℹ️  Nenhum artifact encontrado — o banco será criado do zero."
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Dependências
        working-directory: v1
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium (Playwright)
        working-directory: v1
        run: python -m playwright install chromium --with-deps

      - name: Executar o Monitoramento
        working-directory: v1
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_SLACK_DESTINATARIO: ${{ secrets.EMAIL_SLACK_DESTINATARIO }}
          SHEETS_WEBHOOK_URL: ${{ secrets.SHEETS_WEBHOOK_URL }}
          SHEETS_WEBHOOK_SECRET: ${{ secrets.SHEETS_WEBHOOK_SECRET }}
          PYTHONPATH: .
        run: |
          set -e
          python main.py

      # ── Salvar banco como artifact (backup de longo prazo) ───────────────
      - name: Salvar banco como artifact (backup long-term)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mast-db-backup
          path: v1/mast_dados.db
          retention-days: 90
          overwrite: true
