name: Monitor de Notícias OSINT

on:
  schedule:
    # Executa todos os dias às 11:00 UTC (08:00 no horário de Brasília)
    - cron: '0 15 * * *'
  
  # A opção abaixo permite que você rode o script manualmente no GitHub com um clique
  workflow_dispatch: 

jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest

    steps:
      # 1. Puxa o seu código do repositório para o servidor do GitHub
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      # 2. Instala e configura a linguagem Python
      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      # 3. Instala as bibliotecas que o seu script precisa para rodar
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      # 4. Executa o seu arquivo Python (certifique-se de que o nome do arquivo seja o mesmo)
      - name: Executar o script
        run: python script.py