name: MAST - Monitoramento Automatizado de Sistemas e Tribunais

on:
  schedule:
    - cron: '00 10 * * *'
  workflow_dispatch:

jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4.2.2

      - name: Configurar o Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Restaurar banco de dados (cache)
        uses: actions/cache@v4
        with:
          path: mast_dados.db
          key: mast-db-${{ runner.os }}
          restore-keys: mast-db-

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar o Monitoramento
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_SLACK_DESTINATARIO: ${{ secrets.EMAIL_SLACK_DESTINATARIO }}
          PYTHONPATH: .
        run: |
          set -e
          python main.py
          

          