name: MAST - Monitoramento Automatizado de Sistemas e Tribunais

"on":
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Executar o script
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_SLACK_DESTINATARIO }}
        run: python script.py
