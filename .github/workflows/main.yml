name: MAST - Monitoramento Automatizado de Sistemas e Tribunais
 
on:
  schedule:
    - cron: '00 10 * * *'
  workflow_dispatch:
 
jobs:
  rodar-monitoramento:
    runs-on: ubuntu-latest
 
    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4.2.2
 
      - name: Configurar o Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
 
      - name: Restaurar banco de dados (cache)
        uses: actions/cache@v4
        with:
          path: mast_dados.db
          # Chave única por run → sempre cache miss → Actions salva ao final de cada execução.
          # restore-keys encontra o save mais recente da branch, garantindo continuidade do banco.
          key: mast-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            mast-db-${{ runner.os }}-
            mast-db-
 
      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Instalar Chromium (Playwright)
        run: python -m playwright install chromium --with-deps
 
      - name: Executar o Monitoramento
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA: ${{ secrets.EMAIL_SENHA }}
          EMAIL_SLACK_DESTINATARIO: ${{ secrets.EMAIL_SLACK_DESTINATARIO }}
          PYTHONPATH: .
        run: |
          set -e
          python main.py

          